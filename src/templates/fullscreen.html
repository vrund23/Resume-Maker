<div class="fixed inset-0 z-[200] bg-slate-900 flex flex-col animate-in fade-in duration-300">
    <!-- Fullscreen Header -->
    <header class="h-16 flex-shrink-0 bg-slate-800 border-b border-slate-700 flex justify-between items-center px-6">
        <div class="flex items-center gap-4">
            <h2 class="text-white font-bold text-lg">Full Screen Preview</h2>
            <div class="px-3 py-1 bg-slate-900 border border-slate-700 rounded-full">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">{{ctrl.selectedTemplate.replace('-', ' ')}}</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button ng-click="ctrl.handleExportPDF()" 
                    class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-all text-sm flex items-center gap-2 shadow-lg shadow-blue-600/20">
                <i lucide-icon="arrow-down-to-line"></i>
                Download PDF
            </button>
            <button ng-click="ctrl.isFullScreenPreview = false" 
                    class="p-2 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-all">
                <i lucide-icon="x" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- Fullscreen Content Area -->
    <div class="flex-1 overflow-auto bg-slate-950 p-12 custom-scrollbar flex justify-center items-start">
        <div class="shadow-2xl bg-white origin-top" style="transform: scale(1.1);">
            <resume-preview content="ctrl.resumeData" template="ctrl.selectedTemplate"></resume-preview>
        </div>
    </div>
</div>
