<!-- Step 1: Contact -->
<div ng-if="ctrl.activeStep === 1" class="space-y-6">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-3">
            <i lucide-icon="user" class="text-blue-600"></i>
            Contact Information
        </h2>
        <div class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Full Name</label>
                <input type="text" ng-model="ctrl.resumeData.personalInfo.fullName" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Professional Email</label>
                <input type="email" ng-model="ctrl.resumeData.personalInfo.email" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Phone Number</label>
                <input type="text" ng-model="ctrl.resumeData.personalInfo.phone" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div class="col-span-2">
                 <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">LinkedIn Profile (URL)</label>
                <input type="text" ng-model="ctrl.resumeData.personalInfo.linkedin" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
             <div class="col-span-2">
                 <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Location (City, State)</label>
                <input type="text" ng-model="ctrl.resumeData.personalInfo.location" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
        </div>
    </div>
</div>

<!-- Step 2: Education -->
<div ng-if="ctrl.activeStep === 2" class="space-y-6">
    <div ng-repeat="edu in ctrl.resumeData.education" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 relative group animate-in slide-in-from-bottom-2 duration-300">
        <button ng-click="ctrl.removeEducation(edu.id)" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
            <i lucide-icon="trash2"></i>
        </button>
        <div class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Degree / Certification</label>
                <input type="text" ng-model="edu.degree" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">School / University</label>
                <input type="text" ng-model="edu.school" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                 <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Location</label>
                <input type="text" ng-model="edu.city" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Start Date</label>
                <input type="text" ng-model="edu.startDate" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">End Date</label>
                <input type="text" ng-model="edu.endDate" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
        </div>
    </div>
    <button ng-click="ctrl.addEducation()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:border-blue-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
        <i lucide-icon="plus-circle"></i>
        Add Education
    </button>
</div>

<!-- Step 3: Experience -->
<div ng-if="ctrl.activeStep === 3" class="space-y-6">
    <div ng-repeat="exp in ctrl.resumeData.experiences" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 relative group animate-in slide-in-from-bottom-2 duration-300">
        <button ng-click="ctrl.removeExperience(exp.id)" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
            <i lucide-icon="trash2"></i>
        </button>
        <div class="grid grid-cols-2 gap-6">
            <div class="col-span-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Job Title</label>
                <input type="text" ng-model="exp.jobTitle" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Employer</label>
                <input type="text" ng-model="exp.employer" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                 <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">City/State</label>
                <input type="text" ng-model="exp.city" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Start Date</label>
                <input type="text" ng-model="exp.startDate" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">End Date</label>
                <input type="text" ng-model="exp.endDate" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div class="col-span-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Description & Achievements</label>
                <textarea ng-model="exp.description" rows="4" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium resize-none text-slate-900"></textarea>
            </div>
        </div>
    </div>
    <button ng-click="ctrl.addExperience()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:border-blue-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
        <i lucide-icon="plus-circle"></i>
        Add Experience
    </button>
</div>

<!-- Step 4: Skills -->
<div ng-if="ctrl.activeStep === 4" class="space-y-6">
    <div ng-repeat="skill in ctrl.resumeData.skills" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 relative group animate-in slide-in-from-bottom-2 duration-300">
        <button ng-click="ctrl.removeSkillGroup(skill.id)" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
            <i lucide-icon="trash2"></i>
        </button>
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Skill Category</label>
                <input type="text" ng-model="skill.category" placeholder="e.g., Programming Languages" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Skills (Comma separated)</label>
                <input type="text" ng-model="skill.items" placeholder="Figma, Adobe XD, React..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium text-slate-900">
            </div>
        </div>
    </div>
    <button ng-click="ctrl.addSkillGroup()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:border-blue-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
        <i lucide-icon="plus-circle"></i>
        Add Skill Category
    </button>
</div>

<!-- Step 5: Summary -->
<div ng-if="ctrl.activeStep === 5" class="space-y-6">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-3">
            <i lucide-icon="file-text" class="text-blue-600"></i>
            Professional Summary
        </h2>
        <div class="space-y-4">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Elevator Pitch</label>
            <textarea ng-model="ctrl.resumeData.summary" rows="8" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-medium resize-none leading-relaxed text-slate-900" placeholder="Write a brief overview of your professional career and key achievements..."></textarea>
        </div>
    </div>
</div>

<!-- Footer Navigation -->
<footer class="mt-12 flex justify-between items-center pb-12">
    <button ng-click="ctrl.activeStep = ctrl.activeStep - 1" ng-disabled="ctrl.activeStep === 1"
            class="flex items-center gap-2 px-6 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-lg transition-all text-sm disabled:opacity-0">
        <i lucide-icon="arrow-left"></i>
        Previous
    </button>
    <button ng-click="ctrl.activeStep < 5 ? ctrl.activeStep = ctrl.activeStep + 1 : ctrl.handleExportPDF()"
            class="flex items-center gap-2 px-8 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-all text-sm shadow-md active:scale-95">
        {{ ctrl.activeStep === 5 ? 'Finalize & Download' : 'Next Step' }}
        <i ng-if="ctrl.activeStep !== 5" lucide-icon="arrow-right"></i>
    </button>
</footer>
