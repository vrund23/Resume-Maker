<div class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl p-8 relative overflow-hidden animate-in zoom-in-95 duration-300">
        <button ng-click="ctrl.isTemplateGalleryOpen = false" class="absolute top-6 right-6 p-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i lucide-icon="x"></i>
        </button>
        
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-slate-900 mb-2">Modern Templates</h2>
            <p class="text-slate-500 font-medium">Select a design engineered for your career goals.</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <button ng-click="ctrl.selectedTemplate = 'modern-sidebar'; ctrl.isTemplateGalleryOpen = false" 
                    class="group relative aspect-[3/4] rounded-2xl overflow-hidden border-4 transition-all"
                    ng-class="ctrl.selectedTemplate === 'modern-sidebar' ? 'border-blue-600 shadow-xl scale-105' : 'border-transparent hover:border-slate-200'">
                <div class="absolute inset-0 bg-slate-50 flex items-center justify-center">
                    <div class="absolute inset-x-0 bottom-0 bg-slate-900 p-3">
                        <span class="text-[10px] font-black uppercase text-white block tracking-widest text-center">Modern Sidebar</span>
                    </div>
                </div>
            </button>
            <button ng-click="ctrl.selectedTemplate = 'tech-stack'; ctrl.isTemplateGalleryOpen = false" 
                    class="group relative aspect-[3/4] rounded-2xl overflow-hidden border-4 transition-all"
                    ng-class="ctrl.selectedTemplate === 'tech-stack' ? 'border-blue-600 shadow-xl scale-105' : 'border-transparent hover:border-slate-200'">
                <div class="absolute inset-0 bg-slate-900 flex items-center justify-center">
                    <div class="absolute inset-x-0 bottom-0 bg-blue-600 p-3">
                        <span class="text-[10px] font-black uppercase text-white block tracking-widest text-center">Tech Stack</span>
                    </div>
                </div>
            </button>
            <button ng-click="ctrl.selectedTemplate = 'classic-executive'; ctrl.isTemplateGalleryOpen = false" 
                    class="group relative aspect-[3/4] rounded-2xl overflow-hidden border-4 transition-all"
                    ng-class="ctrl.selectedTemplate === 'classic-executive' ? 'border-blue-600 shadow-xl scale-105' : 'border-transparent hover:border-slate-200'">
                <div class="absolute inset-0 bg-white border border-slate-100 flex items-center justify-center">
                    <div class="absolute inset-x-0 bottom-0 bg-slate-800 p-3">
                        <span class="text-[10px] font-black uppercase text-white block tracking-widest text-center">Classic Exec</span>
                    </div>
                </div>
            </button>
            <button ng-click="ctrl.selectedTemplate = 'bold-impact'; ctrl.isTemplateGalleryOpen = false" 
                    class="group relative aspect-[3/4] rounded-2xl overflow-hidden border-4 transition-all"
                    ng-class="ctrl.selectedTemplate === 'bold-impact' ? 'border-blue-600 shadow-xl scale-105' : 'border-transparent hover:border-slate-200'">
                <div class="absolute inset-0 bg-slate-800 flex items-center justify-center">
                    <div class="absolute inset-x-0 bottom-0 bg-slate-950 p-3">
                        <span class="text-[10px] font-black uppercase text-white block tracking-widest text-center">Bold Impact</span>
                    </div>
                </div>
            </button>
        </div>
    </div>
</div>
